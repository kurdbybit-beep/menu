<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Mobile Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            /* من ڕەنگێ باکگراوندێ کارتێ کێم کر دا پتر شەفاف بیت */
            --card-bg: rgba(255, 255, 255, 0.08); 
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.7)), 
                        url('https://i.postimg.cc/qRzMnWFV/photo-2026-05-09-18-07-24.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        header {
            padding: 30px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(2,6,23,0.8), transparent);
        }

        header h1 { 
            font-size: 2.2rem; 
            margin: 0; 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .phone-link { 
            color: var(--primary); 
            margin-top: 10px; 
            font-size: 1.3rem; 
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            direction: ltr;
        }

        .social-icons {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons a {
            color: var(--primary);
            font-size: 1.8rem;
            transition: 0.3s;
            text-decoration: none;
        }

        .categories-container {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            padding: 12px 0;
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid var(--glass-border);
        }

        .categories-container::-webkit-scrollbar { display: none; }

        .cat-btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .cat-btn.active {
            background: var(--primary);
            color: #020617;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .menu-section { padding: 15px; display: none; }
        .menu-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .food-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        /* --- ستایلێ شەفاف (Transparent) بۆ کارتان --- */
        .food-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(8px); /* کارتێ شەفاف دکەت */
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .food-img {
            width: 100%;
            height: 130px;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .food-info { 
            padding: 12px; 
            text-align: center; 
            background: transparent; /* لێرە بەشێ ڕەش نەما */
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .food-info h3 { 
            margin: 0 0 8px 0; 
            font-size: 0.95rem; 
            line-height: 1.2;
            min-height: 2.4em;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .price-tag {
            background: var(--accent);
            color: #000;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 0.85rem;
            display: inline-block;
        }

        .location-tag {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            color: var(--primary);
            font-weight: bold;
        }

    </style>
</head>
<body>

<header>
    <h1>TECH REST</h1>
    <a href="tel:07853131515" class="phone-link">
        <i class="fas fa-phone-alt"></i> 07853131515
    </a>
    
    <div class="social-icons">
        <a href="https://www.instagram.com/__tech_.ai._?igsh=MTZ2ZGIxcXB2YjVjaw%3D%3D&utm_source=qr" target="_blank">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://www.tiktok.com/@_tech_ai_?_r=1&_t=ZS-96F7xvMB0zP" target="_blank">
            <i class="fab fa-tiktok"></i>
        </a>
    </div>
</header>

<div class="categories-container" id="catBar"></div>
<div id="menuContent"></div>

<div class="location-tag">
    <i class="fas fa-map-marker-alt"></i> زاخۆ - دەستپێکا رێکا پیشەسازی
</div>

<script>
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTSRjwZs-DPmh8Cg7LwOa1HTa8m58e4LriIPHbkoxdNp-vcgkNHHsVnp89Dj_TE7xiDLMugKBJRtsBr/pub?output=csv';
    let dataList = [];

    async function loadData() {
        try {
            const res = await fetch(csvUrl);
            const txt = await res.text();
            const rows = txt.split('\n').slice(1);
            dataList = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return { name: c[0], price: c[1], img: c[2], cat: c[3] };
            }).filter(i => i.cat);
            renderMenu();
        } catch (e) { console.error(e); }
    }

    function renderMenu() {
        const catBar = document.getElementById('catBar');
        const menuContent = document.getElementById('menuContent');
        const cats = [...new Set(dataList.map(i => i.cat))];
        catBar.innerHTML = '';
        menuContent.innerHTML = '';

        cats.forEach((cat, index) => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${index === 0 ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => switchCat(cat, btn);
            catBar.appendChild(btn);

            const section = document.createElement('div');
            section.id = `section-${cat}`;
            section.className = `menu-section ${index === 0 ? 'active' : ''}`;
            const gridDiv = document.createElement('div');
            gridDiv.className = 'food-grid';
            dataList.filter(f => f.cat === cat).forEach(food => {
                gridDiv.innerHTML += `
                    <div class="food-card">
                        <div class="food-img" style="background-image: url('${food.img}')"></div>
                        <div class="food-info">
                            <h3>${food.name}</h3>
                            <div><span class="price-tag">${food.price}</span></div>
                        </div>
                    </div>
                `;
            });
            section.appendChild(gridDiv);
            menuContent.appendChild(section);
        });
    }

    function switchCat(catName, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.menu-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`section-${catName}`).classList.add('active');
    }

    loadData();
</script>
</body>
</html>
