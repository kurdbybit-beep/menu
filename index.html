<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Rest | Modern Menu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');

        :root {
            --primary: #38bdf8;
            --accent: #fbbf24;
            --card-bg: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Noto Sans Arabic', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(rgba(2, 6, 23, 0.7), rgba(2, 6, 23, 0.7)), 
                        url('https://i.postimg.cc/qRzMnWFV/photo-2026-05-09-18-07-24.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* --- Cart Icon Header --- */
        .top-nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            position: absolute;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .cart-icon-wrapper {
            position: relative;
            cursor: pointer;
            background: rgba(56, 189, 248, 0.2);
            padding: 10px;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        #cart-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent);
            color: #000;
            font-size: 0.7rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 50%;
        }

        header {
            padding: 60px 20px 30px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(2,6,23,0.8), transparent);
        }

        header h1 { font-size: 2.2rem; color: var(--primary); text-transform: uppercase; }

        /* --- Menu Grid --- */
        .food-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }

        .food-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .add-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary);
            color: #fff;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .food-img { width: 100%; height: 130px; background-size: cover; background-position: center; }

        .food-info { padding: 12px; text-align: center; flex-grow: 1; }
        .food-info h3 { font-size: 0.95rem; margin-bottom: 8px; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .price-tag { background: var(--accent); color: #000; padding: 4px 10px; border-radius: 12px; font-weight: 900; }

        /* --- Cart Panel (English Language Design) --- */
        #cart-panel {
            position: fixed;
            top: 0;
            left: -100%;
            width: 85%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            z-index: 2000;
            transition: 0.4s ease;
            padding: 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            direction: ltr; /* Set cart to Left-to-Right for English */
        }

        #cart-panel.open { left: 0; }

        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        .cart-header h2 { font-family: sans-serif; margin: 0; }
        
        .cart-items { margin-top: 20px; max-height: 60vh; overflow-y: auto; }
        
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-family: sans-serif;
        }

        .cart-total {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed var(--glass-border);
            text-align: center;
            font-family: sans-serif;
        }

        .clear-all { 
            color: #ff4444; 
            border: 1px solid #ff4444; 
            background: transparent; 
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer; 
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
        .clear-all:hover { background: #ff4444; color: white; }

        .categories-container { position: sticky; top: 0; z-index: 100; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); padding: 12px 0; overflow-x: auto; white-space: nowrap; }
        .cat-btn { display: inline-block; padding: 10px 20px; margin: 0 5px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 50px; font-weight: bold; }
        .cat-btn.active { background: var(--primary); color: #020617; }
        .menu-section { display: none; }
        .menu-section.active { display: block; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="cart-icon-wrapper" onclick="toggleCart()">
        <i class="fas fa-shopping-basket fa-lg" style="color: var(--primary);"></i>
        <span id="cart-count">0</span>
    </div>
</div>

<header>
    <h1>TECH REST</h1>
    <div class="social-icons">
        <a href="https://www.instagram.com/__tech_.ai._" target="_blank" style="color: var(--primary); margin: 0 10px;"><i class="fab fa-instagram fa-lg"></i></a>
        <a href="https://www.tiktok.com/@_tech_ai_" target="_blank" style="color: var(--primary); margin: 0 10px;"><i class="fab fa-tiktok fa-lg"></i></a>
    </div>
</header>

<div id="cart-panel">
    <div class="cart-header">
        <h2>My Cart</h2>
        <i class="fas fa-times fa-lg" onclick="toggleCart()" style="cursor: pointer;"></i>
    </div>
    <div class="cart-items" id="cart-list">
        <p style="text-align: center; opacity: 0
