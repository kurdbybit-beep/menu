<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitle">تەکنۆ ساخلەمی | ڕێبەری پزیشکی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&family=Poppins:wght@400;600;800&display=swap');

        :root {
            --main-blue: #2563eb;
            --light-blue: #eff6ff;
            --accent-green: #10b981;
            --danger-red: #ef4444;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-gray: #f8fafc;
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Noto Sans Arabic', 'Poppins', sans-serif;
            margin: 0; background-color: var(--bg-gray);
            color: var(--text-dark);
            padding-bottom: 50px;
        }

        /* Language Switcher Container */
        .lang-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
        }
        html[dir="ltr"] .lang-container {
            left: auto;
            right: 20px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.15);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 10px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
        }
        .lang-btn:hover { background: rgba(255, 255, 255, 0.25); }

        .lang-dropdown {
            position: absolute;
            top: 50px;
            left: 0;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: none;
            flex-direction: column;
            overflow: hidden;
            width: 120px;
            border: 1px solid var(--light-blue);
        }
        html[dir="ltr"] .lang-dropdown { left: auto; right: 0; }
        .lang-dropdown.show { display: flex; }

        .lang-option {
            padding: 12px 15px;
            cursor: pointer;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
        }
        .lang-option:hover { background: var(--light-blue); color: var(--main-blue); }

        header {
            background: linear-gradient(135deg, var(--main-blue), #1e40af);
            color: var(--white);
            padding: 55px 20px;
            text-align: center;
            border-radius: 0 0 45px 45px;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.15);
            margin-bottom: 30px;
            position: relative;
        }

        .logo-icon { font-size: 2.8rem; margin-bottom: 12px; }
        header h1 { margin: 0; font-size: 2.1rem; font-weight: 900; }
        header p { opacity: 0.9; margin-top: 8px; font-size: 1.05rem; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        /* Top Global Search */
        .search-container {
            max-width: 600px;
            margin: -25px auto 30px;
            padding: 0 20px;
        }
        .search-wrapper {
            background: var(--white); padding: 8px 15px; border-radius: 20px;
            display: flex; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            border: 2px solid var(--light-blue);
        }
        .search-wrapper input { flex: 1; border: none; padding: 12px; font-family: inherit; font-size: 1rem; outline: none; }
        .search-wrapper i { color: var(--main-blue); font-size: 1.2rem; }

        /* Step Content Controls */
        .step-content { display: none; animation: slideUp 0.4s ease-out; }
        .step-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .step-title { text-align: center; margin-bottom: 30px; font-weight: 900; color: var(--text-dark); font-size: 1.5rem; }
        .step-title::after { content: ''; display: block; width: 50px; height: 4px; background: var(--main-blue); margin: 8px auto; border-radius: 5px; }

        /* Back Button */
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            margin-bottom: 20px; color: var(--main-blue);
            cursor: pointer; font-weight: 700; background: var(--white);
            padding: 8px 16px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            font-size: 0.95rem;
        }
        .back-btn:hover { background: var(--light-blue); }
        html[dir="ltr"] .back-btn i { transform: rotate(180deg); }

        /* Grid Layouts */
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        /* Nav Selection Cards */
        .select-card {
            background: var(--white); padding: 35px 20px; border-radius: 25px;
            text-align: center; cursor: pointer; border: 2px solid transparent;
            box-shadow: 0 6px 15px rgba(0,0,0,0.02);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .select-card:hover { 
            border-color: var(--main-blue); transform: translateY(-5px); 
            box-shadow: 0 12px 25px rgba(37, 99, 235, 0.08); 
        }
        .select-card .icon-box { 
            font-size: 2.5rem; color: var(--main-blue); margin-bottom: 15px; 
            background: var(--light-blue); width: 70px; height: 70px;
            display: flex; align-items: center; justify-content: center; border-radius: 20px;
        }
        .select-card span { font-weight: 900; font-size: 1.2rem; }

        /* Doctor Profiles View */
        .doctor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .dr-card {
            background: var(--white); border-radius: 25px; padding: 25px;
            border: 1px solid var(--light-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .dr-info { display: flex; gap: 15px; align-items: center; margin-bottom: 15px; }
         
        .dr-avatar {
            width: 75px; height: 75px; border-radius: 50%; object-fit: cover;
            border: 3px solid var(--light-blue); background-color: #e2e8f0;
        }

        .dr-details h3 { margin: 0 0 5px 0; font-size: 1.15rem; color: var(--main-blue); font-weight: 900; }
        .dr-details .spec-text { margin: 0; font-size: 0.9rem; color: var(--text-muted); font-weight: 700; }

        .schedule-info {
            background: #fdfdfd; border: 1px solid #f1f5f9; padding: 12px;
            border-radius: 15px; margin-bottom: 15px; font-size: 0.9rem;
        }
        .schedule-line { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .schedule-line:last-child { margin-bottom: 0; }
        .schedule-line i { width: 18px; text-align: center; }
         
        .text-work { color: #166534; font-weight: 700; }
        .text-off { color: var(--danger-red); font-weight: 700; }
        .text-time { color: var(--text-dark); font-weight: 700; }

        .phone-line { font-size: 0.9rem; margin-bottom: 15px; color: var(--text-dark); display: flex; align-items: center; gap: 8px; }
        .phone-line i { color: var(--accent-green); }

        .actions { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 10px; border-radius: 12px; text-align: center; text-decoration: none; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer;}
        .call-btn { background: var(--main-blue); color: white; }
        .call-btn:hover { background: #1d4ed8; }
        .map-btn { background: var(--light-blue); color: var(--main-blue); }
        .map-btn:hover { background: #dbeafe; }

        .loader { text-align: center; padding: 80px 20px; font-weight: 700; color: var(--main-blue); font-size: 1.2rem; }

        /* Modal (پەنجەرەی بچووک بۆ مەوعەد) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--white); width: 100%; max-width: 400px;
            padding: 30px; border-radius: 25px; box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: modalUp 0.3s ease-out; position: relative;
        }
        @keyframes modalUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
         
        .modal-title { margin: 0 0 20px 0; font-weight: 900; color: var(--text-dark); font-size: 1.3rem; text-align: center; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.9rem; color: var(--text-dark); }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid var(--light-blue); border-radius: 12px; font-family: inherit; font-size: 0.95rem; outline: none; }
        .form-group input:focus { border-color: var(--main-blue); }
         
        .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; font-family: inherit; font-size: 1rem; font-weight: 700; border: none; cursor: pointer; text-align: center; }
        .btn-confirm { background: var(--accent-green); color: white; }
        .btn-confirm:hover { background: #059669; }
        .btn-cancel { background: #f1f5f9; color: var(--text-muted); }
        .btn-cancel:hover { background: #e2e8f0; }

        @media (max-width: 600px) {
            header { padding: 65px 20px 45px; }
            header h1 { font-size: 1.7rem; }
            .selection-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
            .select-card { padding: 25px 15px; }
            .select-card .icon-box { font-size: 2rem; width: 55px; height: 55px; margin-bottom: 10px; }
            .select-card span { font-size: 1.05rem; }
            .doctor-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="lang-container">
    <button class="lang-btn" onclick="toggleLangDropdown()">
        <i class="fas fa-globe"></i> <span id="currentLangLabel">کوردی</span>
    </button>
    <div class="lang-dropdown" id="langDropdown">
        <div class="lang-option" onclick="changeLanguage('ku')">کوردی</div>
        <div class="lang-option" onclick="changeLanguage('ar')">العربية</div>
        <div class="lang-option" onclick="changeLanguage('en')">English</div>
    </div>
</div>

<header>
    <div class="logo-icon"><i class="fas fa-user-md"></i></div>
    <h1 id="mainTitle">تەکنۆ ساخلەمی</h1>
    <p id="mainSub">ڕێبەری پزیشکی و تەندروستی گشتی</p>
</header>

<div class="search-container">
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="گەڕانی خێرا بۆ ناڤێ دختۆری، پسپۆڕی یان نەخۆشخانێ..." onkeyup="handleGlobalSearch()">
        <i class="fas fa-search"></i>
    </div>
</div>

<div class="container">
    <div id="loader" class="loader"><i class="fas fa-spinner fa-spin"></i> چاوەڕێبە... زانیارییەکان باردەکرێن</div>

    <div id="step1" class="step-content">
        <h2 id="step1Title" class="step-title">باژێڕێ خۆ هەلبژێره</h2>
        <div id="cityGrid" class="selection-grid"></div>
    </div>

    <div id="step2" class="step-content">
        <div class="back-btn" id="backToCityBtn" onclick="goToStep(1)"><i class="fas fa-arrow-right"></i> زفرین بو باژێڕا</div>
        <h2 id="hospitalStepTitle" class="step-title">نەخۆشخانە یان سەنتەرێن باژێڕێ</h2>
        <div id="hospitalGrid" class="selection-grid"></div>
    </div>

    <div id="step3" class="step-content">
        <div class="back-btn" id="drBackBtn" onclick="goToStep(2)"><i class="fas fa-arrow-right"></i> زفرین</div>
        <h2 id="doctorStepTitle" class="step-title">لیستا پزیشکان</h2>
        <div id="doctorsGrid" class="doctor-grid"></div>
    </div>
</div>

<div class="modal" id="appointmentModal">
    <div class="modal-content">
        <h3 class="modal-title" id="modalTitle">پلانی مەوعەدی</h3>
        <input type="hidden" id="selectedDoctorName">
        <div class="form-group">
            <label id="lblPatientName" for="patientName">ناڤێ سی قۆلی یێ نەخۆشی:</label>
            <input type="text" id="patientName" placeholder="...">
        </div>
        <div class="form-group">
            <label id="lblPatientAge" for="patientAge">عمری نەخۆشی:</label>
            <input type="number" id="patientAge" placeholder="...">
        </div>
        <div class="modal-actions">
            <button class="modal-btn btn-confirm" id="btnConfirm" onclick="submitAppointment()">تمام</button>
            <button class="modal-btn btn-cancel" id="btnCancel" onclick="closeModal()">پاشگەزبوونەوە</button>
        </div>
    </div>
</div>

<script>
    const sheetUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS2e44rCpkyZP0UzZb7Oz0taJUJ62Tfi6EzqBKHNb1UPrRHnBxUXPjgSGk8nlg-EtEe_8dIvIcTqC20/pub?output=csv';
    
    let allData = [];
    let currentCity = '';
    let currentHospital = '';
    let isSearchActive = false;
    let lang = 'ku'; 

    const translations = {
        ku: {
            title: "تەکنۆ ساخلەمی | ڕێبەری پزیشکی",
            mainTitle: "تەکنۆ ساخلەمی",
            mainSub: "ڕێبەری پزیشکی و تەندروستی گشتی",
            searchPlaceholder: "گەڕانی خێرا بۆ ناڤێ دختۆری، پسپۆڕی یان نەخۆشخانێ...",
            loader: "چاوەڕێبە... زانیارییەکان باردەکرێن",
            step1Title: "باژێڕێ خۆ هەلبژێره",
            backToCity: "زفرین بو باژێڕا",
            backBtn: "زفرین",
            hospTitle: "نەخۆشخانە یان سەنتەرێن باژێڕێ", // پشتیوانیا بەندێ گشتی دکەت ل شوونا گوهۆڕینێ
            drTitle: "پزیشکێن",
            workDays: "ڕۆژێن دەوامێ",
            offDays: "ڕۆژێن ئۆف",
            workTime: "دەمژمێر",
            phone: "ژمارە",
            call: "پەیوەندی",
            address: "پلانی مەوعەدی",
            noDr: "چ پزیشک نەهاتنە دۆزینەوە!",
            searchResult: "ئەنجامێن گەڕانێ بۆ",
            currentLang: "کوردی",
            modalTitle: "پلانی مەوعەدی",
            lblPatientName: "ناڤێ سی قۆلی یێ نەخۆشی:",
            lblPatientAge: "عمری نەخۆشی:",
            btnConfirm: "تمام",
            btnCancel: "پاشگەزبوونەوە"
        },
        ar: {
            title: "تکنو ساخلەمی | الدليل الطبي",
            mainTitle: "تکنو ساخلەمی",
            mainSub: "الدليل الطبي والصحي العام",
            searchPlaceholder: "بحث سريع عن اسم الطبيب، الاختصاص أو المستشفى...",
            loader: "انتظر قليلاً... جاري تحميل البيانات",
            step1Title: "اختر مدينتك",
            backToCity: "العودة للمدن",
            backBtn: "رجوع",
            hospTitle: "المستشفيات والمراكز في مدينة", 
            drTitle: "أطباء",
            workDays: "أيام الدوام",
            offDays: "أيام العطلة",
            workTime: "الساعات",
            phone: "الهاتف",
            call: "اتصال",
            address: "حجز موعد",
            noDr: "لم يتم العثور على أطباء!",
            searchResult: "نتائج البحث عن",
            currentLang: "العربية",
            modalTitle: "حجز موعد جديد",
            lblPatientName: "اسم المريض الثلاثي:",
            lblPatientAge: "عمر المريض:",
            btnConfirm: "موافق",
            btnCancel: "إلغاء"
        },
        en: {
            title: "Tech AI Health | Medical Guide",
            mainTitle: "Tech AI Health",
            mainSub: "General Medical & Health Guide",
            searchPlaceholder: "Quick search for doctor, specialty or hospital...",
            loader: "Please wait... Loading data",
            step1Title: "Select Your City",
            backToCity: "Back to Cities",
            backBtn: "Back",
            hospTitle: "Hospitals & Centers in", 
            drTitle: "Doctors of",
            workDays: "Working Days",
            offDays: "Off Days",
            workTime: "Hours",
            phone: "Phone",
            call: "Call",
            address: "Book Appointment",
            noDr: "No doctors found!",
            searchResult: "Search results for",
            currentLang: "English",
            modalTitle: "Book Appointment",
            lblPatientName: "Patient Triple Name:",
            lblPatientAge: "Patient Age:",
            btnConfirm: "Confirm",
            btnCancel: "Cancel"
        }
    };

    const defaultAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'><path d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z'/></svg>";

    function toggleLangDropdown() {
        document.getElementById('langDropdown').classList.toggle('show');
    }

    function changeLanguage(selectedLang) {
        lang = selectedLang;
        document.getElementById('langDropdown').classList.remove('show');
        
        const htmlTag = document.documentElement;
        htmlTag.lang = lang;
        htmlTag.dir = (lang === 'en') ? 'ltr' : 'rtl';

        document.getElementById('siteTitle').innerText = translations[lang].title;
        document.getElementById('currentLangLabel').innerText = translations[lang].currentLang;
        document.getElementById('mainTitle').innerText = translations[lang].mainTitle;
        document.getElementById('mainSub').innerText = translations[lang].mainSub;
        document.getElementById('searchInput').placeholder = translations[lang].searchPlaceholder;
        document.getElementById('step1Title').innerText = translations[lang].step1Title;
        document.getElementById('backToCityBtn').innerHTML = `<i class="fas fa-arrow-right"></i> ${translations[lang].backToCity}`;
        document.getElementById('drBackBtn').innerHTML = `<i class="fas fa-arrow-right"></i> ${translations[lang].backBtn}`;
        
        // Update Modal Translations
        document.getElementById('modalTitle').innerText = translations[lang].modalTitle;
        document.getElementById('lblPatientName').innerText = translations[lang].lblPatientName;
        document.getElementById('lblPatientAge').innerText = translations[lang].lblPatientAge;
        document.getElementById('btnConfirm').innerText = translations[lang].btnConfirm;
        document.getElementById('btnCancel').innerText = translations[lang].btnCancel;

        renderCities();
        if(currentCity) {
            updateHospitalStepTitle();
            renderHospitals();
        }
        if(currentHospital) {
            const sample = allData.find(i => i.hospital_ku.trim() === currentHospital.trim());
            document.getElementById('doctorStepTitle').innerText = `${translations[lang].drTitle} [${getLocalizedValue(sample, 'hospital')}]`;
            filterAndRenderDoctors();
        }
    }

    // فەنکشنا نوو بۆ داینامیک گوهۆڕینا ناڤێ هیدەرێ لاپەڕێ نەخۆشخانەیان گونجای دگەل مەرجێن تە
    function updateHospitalStepTitle() {
        const titleElement = document.getElementById('hospitalStepTitle');
        const cityNameKu = currentCity.trim().toLowerCase();

        if (cityNameKu === 'زاخو' || cityNameKu === 'زاخۆ') {
            if (lang === 'ku') {
                titleElement.innerText = "نەخۆشخانە سەنتەری [زاخو]";
            } else if (lang === 'ar') {
                titleElement.innerText = "المستشفيات في مدينة [زاخو]";
            } else if (lang === 'en') {
                titleElement.innerText = "Hospitals in [zakho]";
            }
        } else if (cityNameKu === 'دهوك' || cityNameKu === 'دهۆک') {
            if (lang === 'ku') {
                titleElement.innerText = "نەخۆشخانە سەنتەری [دهوك]";
            } else if (lang === 'ar') {
                titleElement.innerText = "المستشفيات في مدينة [دهوك]";
            } else if (lang === 'en') {
                titleElement.innerText = "Hospitals in [Duhok]";
            }
        } else {
            // ئەگەر باژێڕەکێ دی هەبیت د ئایندە دا، دێ شێوازێ گشتی وەرگریت
            const sample = allData.find(i => i.city_ku.trim() === currentCity.trim());
            titleElement.innerText = `${translations[lang].hospTitle} [${getLocalizedValue(sample, 'city')}]`;
        }
    }

    document.addEventListener("DOMContentLoaded", function() {
        // dynamic layout fixes for responsiveness
    });

    function getLocalizedValue(item, key) {
        if (!item) return '';
        if (key === 'workTime' || key === 'image' || key === 'phone') return item[key]; 
        return item[`${key}_${lang}`] || item[`${key}_ku`] || ''; 
    }

    window.onclick = function(event) {
        if (!event.target.matches('.lang-btn') && !event.target.matches('.lang-btn *')) {
            document.getElementById('langDropdown').classList.remove('show');
        }
    }

    async function loadData() {
        try {
            const res = await fetch(sheetUrl);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            
            allData = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return { 
                    name_ku: c[0] || '', name_ar: c[1] || '', name_en: c[2] || '', 
                    hospital_ku: c[3] || '', hospital_ar: c[4] || '', hospital_en: c[5] || '', 
                    city_ku: c[6] || '', city_ar: c[7] || '', city_en: c[8] || '', 
                    specialty_ku: c[9] || '', specialty_ar: c[10] || '', specialty_en: c[11] || '', 
                    image: c[12] || '', 
                    workDays_ku: c[13] || '', workDays_ar: c[14] || '', workDays_en: c[15] || '', 
                    offDays_ku: c[16] || '', offDays_ar: c[17] || '', offDays_en: c[18] || '', 
                    workTime: c[19] || '', 
                    phone: c[20] || ''     
                };
            }).filter(i => i.name_ku || i.name_en);

            document.getElementById('loader').style.display = 'none';
            renderCities();
            goToStep(1);
        } catch (e) {
            document.getElementById('loader').innerHTML = "<i class='fas fa-exclamation-triangle'></i> Error loading data!";
            console.error(e);
        }
    }

    function goToStep(s) {
        isSearchActive = false;
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderCities() {
        const uniqueCities = [...new Set(allData.map(i => i.city_ku.trim()).filter(Boolean))];
        const grid = document.getElementById('cityGrid');
        
        grid.innerHTML = uniqueCities.map(cityKu => {
            const sampleItem = allData.find(i => i.city_ku.trim() === cityKu);
            const displayCity = getLocalizedValue(sampleItem, 'city');
            return `
                <div class="select-card" onclick="selectCity('${cityKu.replace(/'/g, "\\'")}')">
                    <div class="icon-box"><i class="fas fa-map-marker-alt"></i></div>
                    <span>${displayCity}</span>
                </div>
            `;
        }).join('');
    }

    function selectCity(cityKu) {
        currentCity = cityKu;
        updateHospitalStepTitle(); // ڕوانکرنا ناڤ و دەقێ هیدەری ل فەنکشنا جودا
        renderHospitals();
        goToStep(2);
    }

    function renderHospitals() {
        const filtered = allData.filter(i => i.city_ku.trim() === currentCity.trim());
        const uniqueHospitals = [...new Set(filtered.map(i => i.hospital_ku.trim()).filter(Boolean))];
        const grid = document.getElementById('hospitalGrid');
        
        grid.innerHTML = uniqueHospitals.map(hospKu => {
            const sampleItem = allData.find(i => i.hospital_ku.trim() === hospKu);
            const displayHospital = getLocalizedValue(sampleItem, 'hospital');
            return `
                <div class="select-card" onclick="selectHospital('${hospKu.replace(/'/g, "\\'")}')">
                    <div class="icon-box"><i class="fas fa-hospital"></i></div>
                    <span>${displayHospital}</span>
                </div>
            `;
        }).join('');
    }

    function selectHospital(hospKu) {
        currentHospital = hospKu;
        document.getElementById('drBackBtn').setAttribute('onclick', 'goToStep(2)');
        const sample = allData.find(i => i.hospital_ku.trim() === hospKu.trim());
        document.getElementById('doctorStepTitle').innerText = `${translations[lang].drTitle} [${getLocalizedValue(sample, 'hospital')}]`;
        
        filterAndRenderDoctors();
        goToStep(3);
    }

    function filterAndRenderDoctors() {
        const filtered = allData.filter(i => 
            i.city_ku.trim() === currentCity.trim() && 
            i.hospital_ku.trim() === currentHospital.trim()
        );
        renderDoctors(filtered);
    }

    function renderDoctors(data) {
        const grid = document.getElementById('doctorsGrid');
        if(data.length === 0) {
            grid.innerHTML = `<p style='grid-column:1/-1; text-align:center; color:var(--text-muted);'>${translations[lang].noDr}</p>`;
            return;
        }

        grid.innerHTML = data.map(i => {
            const imgUrl = i.image ? i.image : defaultAvatar;
            const name = getLocalizedValue(i, 'name');
            const specialty = getLocalizedValue(i, 'specialty');
            const workDays = getLocalizedValue(i, 'workDays');
            const offDays = getLocalizedValue(i, 'offDays');
            const hospital = getLocalizedValue(i, 'hospital');
            const city = getLocalizedValue(i, 'city');
            const workTime = i.workTime; 

            const escapedName = name.replace(/'/g, "\\'");

            return `
                <div class="dr-card">
                    <div>
                        <div class="dr-info">
                            <img src="${imgUrl}" class="dr-avatar" onerror="this.src='${defaultAvatar}'" alt="Doctor">
                            <div class="dr-details">
                                <h3>${name}</h3>
                                <p class="spec-text">${specialty}</p>
                            </div>
                        </div>

                        <div class="schedule-info">
                            ${workDays ? `<div class="schedule-line text-work"><i class="fas fa-calendar-check"></i> ${translations[lang].workDays}: ${workDays}</div>` : ''}
                            ${offDays ? `<div class="schedule-line text-off"><i class="fas fa-calendar-times"></i> ${translations[lang].offDays}: ${offDays}</div>` : ''}
                            ${workTime ? `<div class="schedule-line text-time"><i class="far fa-clock"></i> ${translations[lang].workTime}: ${workTime}</div>` : ''}
                            <div class="schedule-line" style="color: var(--text-muted); margin-top:5px; font-size:0.8rem;">
                                <i class="fas fa-building"></i> ${hospital} - ${city}
                            </div>
                        </div>
                    </div>

                    <div>
                        ${i.phone ? `<div class="phone-line"><i class="fas fa-phone-alt"></i> ${translations[lang].phone}: ${i.phone}</div>` : ''}
                        <div class="actions">
                            ${i.phone ? `<a href="tel:${i.phone}" class="action-btn call-btn"><i class="fas fa-phone"></i> ${translations[lang].call}</a>` : ''}
                            <div onclick="openAppointmentModal('${escapedName}')" class="action-btn map-btn"><i class="fas fa-calendar-plus"></i> ${translations[lang].address}</div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function openAppointmentModal(drName) {
        document.getElementById('selectedDoctorName').value = drName;
        document.getElementById('patientName').value = '';
        document.getElementById('patientAge').value = '';
        document.getElementById('appointmentModal').classList.add('show');
    }

    document.getElementById('btnCancel').addEventListener('click', closeModal);

    function closeModal() {
        document.getElementById('appointmentModal').classList.remove('show');
    }

    function submitAppointment() {
        const drName = document.getElementById('selectedDoctorName').value;
        const pName = document.getElementById('patientName').value.trim();
        const pAge = document.getElementById('patientAge').value.trim();

        if(!pName || !pAge) {
            alert(lang === 'ku' ? 'تکایە هەموو خانەکان پڕ بکەرەوە!' : lang === 'ar' ? 'يرجى ملء جميع الحقول!' : 'Please fill all fields!');
            return;
        }

        const message = `طلب حجز موعد جديد:\n\n• اسم الطبيب: ${drName}\n• اسم المريض: ${pName}\n• عمر المريض: ${pAge}`;
        const telegramUrl = `https://t.me/falahzakho?text=${encodeURIComponent(message)}`;
        
        closeModal();
        window.open(telegramUrl, '_blank');
    }

    function handleGlobalSearch() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        
        if (query === '') {
            if(isSearchActive) {
                goToStep(1);
            }
            return;
        }

        isSearchActive = true;
        document.getElementById('doctorStepTitle').innerText = `${translations[lang].searchResult}: "${query}"`;
        document.getElementById('drBackBtn').setAttribute('onclick', 'resetSearch()');

        const filtered = allData.filter(i => 
            i.name_ku.toLowerCase().includes(query) || i.name_ar.toLowerCase().includes(query) || i.name_en.toLowerCase().includes(query) ||
            i.specialty_ku.toLowerCase().includes(query) || i.specialty_ar.toLowerCase().includes(query) || i.specialty_en.toLowerCase().includes(query) ||
            i.hospital_ku.toLowerCase().includes(query) || i.hospital_ar.toLowerCase().includes(query) || i.hospital_en.toLowerCase().includes(query)
        );

        renderDoctors(filtered);
        
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById('step3').classList.add('active');
    }

    function resetSearch() {
        document.getElementById('searchInput').value = '';
        goToStep(1);
    }

    loadData();
</script>

</body>
</html>
